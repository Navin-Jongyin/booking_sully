<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students — Interview Booking</title>
  <link rel="stylesheet" href="student.css" />
</head>
<body>
  <div class="page">
    <nav class="nav-row" aria-label="Site">
      <a href="index.html">Booking page</a>
      <a href="admin.html">Admin panel</a>
    </nav>

    <div class="card">
      <header class="card-header">
        <h1>Add Student</h1>
        <p>Save a student's name, email, and phone number for your interview roster.</p>
      </header>

      <form id="student-form" novalidate>
        <div class="form-group" data-field="name">
          <label for="student-name">Student name</label>
          <input type="text" id="student-name" name="studentName" autocomplete="name" />
          <span class="error-text" role="alert"></span>
        </div>

        <div class="form-group" data-field="email">
          <label for="student-email">Email</label>
          <input type="email" id="student-email" name="studentEmail" autocomplete="email" placeholder="student@example.com" />
          <span class="error-text" role="alert"></span>
        </div>

        <div class="form-group" data-field="phone">
          <label for="student-phone">Phone Number</label>
          <input
            type="tel"
            id="student-phone"
            name="studentPhone"
            autocomplete="tel"
            inputmode="numeric"
            maxlength="10"
            placeholder="1234567890"
          />
          <span class="error-text" role="alert"></span>
        </div>

        <button type="submit" class="btn btn-primary" id="student-submit">Save Student</button>
      </form>

      <div class="success-banner" id="student-banner" role="status" aria-live="polite"></div>
    </div>

    <div class="card">
      <div class="student-list-header">
        <div>
          <h2>Saved Students</h2>
          <p class="hint" id="student-count">No students yet.</p>
        </div>
      </div>
      <div class="student-list" id="student-list"></div>
    </div>
  </div>

  <script type="module" src="student.js"></script>
</body>
</html>
